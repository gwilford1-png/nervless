<title>Nervless — Overcome Public Speaking Anxiety</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Serif+Display:ital@0;1&display=swap');
:root{--bg:#F7F5F0;--surface:#FFFFFF;--surface2:#EDEAE3;--border:#E0DBD2;--text:#1A1814;--muted:#7A7268;--accent:#5B4FD9;--accent2:#7B6FEF;--green:#2E9E7A;--red:#D95470;--gold:#C4922A;
  --phase1:#5B4FD9;--phase1-bg:#EEEAFF;--phase1-border:#C8C0F5;
  --phase2:#2E9E7A;--phase2-bg:#E4F7F1;--phase2-border:#A8DFD0;
  --phase3:#C4922A;--phase3-bg:#FDF3E3;--phase3-border:#F0D49A;
  --phase4:#D95470;--phase4-bg:#FDEAEE;--phase4-border:#F4B8C4;
  --phase5:#7B6FEF;--phase5-bg:#F0EEFF;--phase5-border:#C8C0F5;
  --nav-h:72px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh;flex-direction:column;padding-bottom:var(--nav-h)}.screen.active{display:flex}
/* screens that shouldn't have bottom nav padding */
#screen-landing,#screen-assessment,#screen-level,#screen-apikeys{padding-bottom:0}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--surface);border-top:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-around;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:8px 16px;border-radius:16px;transition:all 0.15s;flex:1;border:none;background:none;font-family:'Nunito',sans-serif}
.nav-item:active{transform:scale(0.92)}
.nav-icon{font-size:24px;line-height:1}
.nav-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.3px}
.nav-item.active .nav-label{color:var(--accent)}
.nav-item.active .nav-icon{filter:drop-shadow(0 0 6px rgba(91,79,217,0.4))}
#screen-landing{background:linear-gradient(160deg,#F7F5F0 0%,#EDE8FF 50%,#F7F5F0 100%);align-items:center;justify-content:flex-start;padding:52px 24px 48px;text-align:center;position:relative;overflow-y:auto}
#screen-landing::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(91,79,217,0.08) 0%,transparent 70%);top:-100px;left:50%;transform:translateX(-50%);pointer-events:none}
.logo{font-family:'DM Serif Display',serif;font-size:52px;color:var(--text);letter-spacing:-1px;margin-bottom:4px}
.logo span{color:var(--accent2)}.tagline{font-size:15px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:48px}
.landing-headline{font-family:'DM Serif Display',serif;font-size:32px;line-height:1.25;margin-bottom:20px;max-width:320px}
.landing-headline em{font-style:italic;color:var(--accent2)}
.landing-sub{font-size:16px;color:var(--muted);line-height:1.6;max-width:300px;margin:0 auto 40px}
.pills{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:48px}
.pill{background:var(--surface2);border:1px solid var(--border);border-radius:100px;padding:8px 16px;font-size:13px;color:var(--muted)}
.pill .dot{color:var(--green);margin-right:6px}
.btn-primary{background:var(--accent);color:white;border:none;border-radius:16px;padding:18px 40px;font-size:17px;font-weight:600;font-family:'Nunito',sans-serif;cursor:pointer;width:100%;max-width:320px;transition:all 0.2s;letter-spacing:-0.3px;display:block;margin:0 auto}
.btn-primary:active{transform:scale(0.97);background:#6A58E0}
.btn-secondary{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:16px;padding:16px 40px;font-size:16px;font-family:'Nunito',sans-serif;cursor:pointer;width:100%;max-width:320px;margin-top:12px;transition:all 0.2s;display:block;margin:12px auto 0}
.btn-secondary:active{transform:scale(0.97)}
#screen-assessment{padding:0}
.assess-header{padding:56px 24px 32px;background:linear-gradient(180deg,#EDE8FF 0%,var(--bg) 100%)}
.back-btn{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;padding:0;margin-bottom:24px;display:block}
.progress-bar{height:3px;background:var(--surface2);border-radius:100px;overflow:hidden;margin-bottom:32px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:100px;transition:width 0.4s cubic-bezier(0.4,0,0.2,1)}
.question-num{font-size:12px;color:var(--accent2);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.question-text{font-family:'DM Serif Display',serif;font-size:26px;line-height:1.3;color:var(--text)}
.assess-body{padding:32px 24px;flex:1}
.scenario-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:16px;font-size:15px;color:var(--muted);line-height:1.5;font-style:italic}
.options{display:flex;flex-direction:column;gap:12px}
.option-btn{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px 20px;text-align:left;cursor:pointer;font-family:'Nunito',sans-serif;font-size:15px;color:var(--text);transition:all 0.15s;display:flex;align-items:center;gap:14px;width:100%}
.option-btn:active{transform:scale(0.98)}.option-btn.selected{border-color:var(--accent);background:rgba(124,106,247,0.1)}
.option-num{width:28px;height:28px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);flex-shrink:0;transition:all 0.15s}
.option-btn.selected .option-num{background:var(--accent);border-color:var(--accent);color:white}
#screen-curriculum{overflow-y:auto;padding-bottom:calc(var(--nav-h) + 20px)}
.curr-header{padding:52px 20px 20px;background:linear-gradient(180deg,#EDE8FF 0%,var(--bg) 100%)}
.curr-phase-header{padding:8px 24px 12px;display:flex;align-items:center;gap:10px;margin-top:8px}
.phase-label{font-size:11px;color:var(--accent2);letter-spacing:2px;text-transform:uppercase;font-weight:700}
.phase-line{flex:1;height:1px;background:var(--border)}
/* Phase section cards */
.phase-block{margin:0 16px 14px;border-radius:22px;overflow:hidden;border:2px solid var(--border)}
.phase-block.ph1{border-color:var(--phase1-border);background:var(--phase1-bg)}
.phase-block.ph2{border-color:var(--phase2-border);background:var(--phase2-bg)}
.phase-block.ph3{border-color:var(--phase3-border);background:var(--phase3-bg)}
.phase-block.ph4{border-color:var(--phase4-border);background:var(--phase4-bg)}
.phase-block.ph5{border-color:var(--phase5-border);background:var(--phase5-bg)}
.phase-block.locked-block{opacity:0.5;filter:grayscale(0.3)}
.phase-header-btn{padding:18px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;background:transparent;border:none;width:100%;text-align:left;font-family:'Nunito',sans-serif}
.phase-icon-circle{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;background:rgba(255,255,255,0.7)}
.phase-header-text{flex:1;min-width:0}
.phase-header-name{font-size:16px;font-weight:800;color:var(--text);margin-bottom:3px}
.phase-header-sub{font-size:13px;font-weight:600;color:var(--muted)}
.phase-chevron{font-size:18px;color:var(--muted);transition:transform 0.25s;flex-shrink:0}
/* Session items inside phase */
.phase-sessions-inner{padding:4px 14px 14px}
.session-card{background:rgba(255,255,255,0.75);border:1.5px solid rgba(255,255,255,0.9);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all 0.15s;margin-bottom:8px}
.session-card:active{transform:scale(0.98)}
.session-card.s-passed{border-color:rgba(46,158,122,0.4);background:rgba(46,158,122,0.04)}
.session-card.s-current{border-color:rgba(91,79,217,0.5);background:rgba(255,255,255,0.95)}
.session-card.s-tried{border-color:rgba(217,84,112,0.35);background:rgba(217,84,112,0.03)}
.session-card.s-locked{opacity:0.5;cursor:not-allowed}
.session-num{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0;background:rgba(255,255,255,0.9);color:var(--muted);border:2px solid rgba(0,0,0,0.08)}
.session-num.s-passed{background:var(--green);color:white;border-color:var(--green)}
.session-num.s-current{background:var(--accent);color:white;border-color:var(--accent);box-shadow:0 0 14px rgba(91,79,217,0.35)}
.session-info{flex:1;min-width:0}
.session-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:2px}
.session-desc{font-size:12px;color:var(--muted);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.current-arrow{font-size:13px;color:var(--accent);font-weight:800;flex-shrink:0}
#screen-practice{background:var(--bg)}
.practice-header{padding:56px 24px 24px;background:linear-gradient(180deg,#EDE8FF 0%,var(--bg) 100%);display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.level-chip{background:rgba(124,106,247,0.15);border:1px solid rgba(124,106,247,0.3);border-radius:100px;padding:6px 14px;font-size:12px;color:var(--accent2);white-space:nowrap;flex-shrink:0}
.prompt-card{margin:0 24px 24px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:28px 24px}
.prompt-label{font-size:11px;color:var(--accent2);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.prompt-text{font-family:'DM Serif Display',serif;font-size:22px;line-height:1.4;color:var(--text)}
.prompt-meta{display:flex;gap:16px;margin-top:16px}
.meta-item{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
.coaching-tip{margin-top:16px;padding-top:16px;border-top:1px solid var(--border);font-size:13px;color:var(--muted);line-height:1.6;font-style:italic}
.coaching-tip strong{color:var(--accent2);font-style:normal}
.recording-zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 24px 40px;gap:24px}
.waveform{width:100%;height:64px;display:flex;align-items:center;justify-content:center;gap:3px;opacity:0.4;transition:opacity 0.3s}.waveform.active{opacity:1}
.wave-bar{width:3px;background:var(--accent);border-radius:100px;animation:wave 1.2s ease-in-out infinite;height:8px}
@keyframes wave{0%,100%{height:8px}50%{height:40px}}
.wave-bar:nth-child(2){animation-delay:.1s}.wave-bar:nth-child(3){animation-delay:.2s}.wave-bar:nth-child(4){animation-delay:.3s}.wave-bar:nth-child(5){animation-delay:.4s}.wave-bar:nth-child(6){animation-delay:.3s}.wave-bar:nth-child(7){animation-delay:.2s}.wave-bar:nth-child(8){animation-delay:.1s}
.waveform:not(.active) .wave-bar{animation:none}
.timer{font-size:48px;font-weight:300;color:var(--text);letter-spacing:-2px;font-variant-numeric:tabular-nums}.timer.recording{color:var(--red)}
.record-btn{width:88px;height:88px;border-radius:50%;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;transition:all 0.2s;background:var(--surface2);position:relative}
.record-btn::before{content:'';position:absolute;inset:-8px;border-radius:50%;border:2px solid transparent;transition:all 0.3s}
.record-btn.recording{background:rgba(255,107,138,0.15);border-color:var(--red)}
.record-btn.recording::before{border-color:rgba(255,107,138,0.3);animation:pulse-ring 1.5s ease-in-out infinite}
@keyframes pulse-ring{0%{transform:scale(1);opacity:1}100%{transform:scale(1.3);opacity:0}}
.record-hint{font-size:13px;color:var(--muted);text-align:center}
#screen-feedback{background:var(--bg);overflow-y:auto;padding-bottom:calc(var(--nav-h) + 20px)}
.feedback-header{padding:56px 24px 32px;background:linear-gradient(180deg,#EDE8FF 0%,var(--bg) 100%);text-align:center}
.feedback-score{width:100px;height:100px;border-radius:50%;background:conic-gradient(var(--green) var(--pct),var(--surface2) 0);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;position:relative}
.feedback-score::before{content:'';position:absolute;inset:10px;border-radius:50%;background:var(--bg)}
.score-num{position:relative;font-family:'DM Serif Display',serif;font-size:32px;color:var(--text);z-index:1}
.feedback-title{font-family:'DM Serif Display',serif;font-size:26px;margin-bottom:8px}.feedback-sub{font-size:15px;color:var(--muted)}
.session-context-strip{margin:0 24px 16px;background:rgba(124,106,247,0.06);border:1px solid rgba(124,106,247,0.2);border-radius:12px;padding:12px 16px;font-size:13px;color:var(--muted);line-height:1.5}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:16px 24px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px 16px}
.metric-label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.metric-value{font-size:28px;font-weight:600;margin-bottom:4px}.metric-desc{font-size:12px;color:var(--muted)}
.tips-section{padding:0 24px}.tips-title{font-size:13px;color:var(--accent2);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.tip-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:12px;display:flex;gap:14px;align-items:flex-start}
.tip-num{width:28px;height:28px;border-radius:50%;background:rgba(124,106,247,0.15);border:1px solid rgba(124,106,247,0.3);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--accent2);flex-shrink:0;font-weight:600}
.tip-text{font-size:14px;color:var(--muted);line-height:1.6}
.transcript-section{padding:24px}.transcript-title{font-size:13px;color:var(--accent2);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.transcript-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;font-size:14px;color:var(--muted);line-height:2}
.filler{background:rgba(244,198,90,0.2);color:var(--gold);border-radius:4px;padding:0 3px}
.feedback-actions{padding:8px 24px;display:flex;flex-direction:column;gap:12px;align-items:center}
.feedback-actions .btn-primary,.feedback-actions .btn-secondary{margin:0}
#screen-dashboard{overflow-y:auto;padding-bottom:calc(var(--nav-h) + 20px)}
.dash-header{padding:56px 24px 32px;background:linear-gradient(180deg,#EDE8FF 0%,var(--bg) 100%)}
.dash-greeting{font-size:13px;color:var(--muted);letter-spacing:1px;margin-bottom:8px}
.dash-title{font-family:'DM Serif Display',serif;font-size:30px;margin-bottom:24px}
.streak-card{background:linear-gradient(135deg,rgba(124,106,247,0.2),rgba(124,106,247,0.05));border:1px solid rgba(124,106,247,0.3);border-radius:20px;padding:20px;display:flex;align-items:center;gap:16px}
.streak-icon{font-size:36px}.streak-label{font-size:12px;color:var(--muted);margin-bottom:4px}.streak-value{font-size:22px;font-weight:700;color:var(--accent2)}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;padding:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 12px;text-align:center}
.stat-value{font-size:26px;font-weight:700;color:var(--text)}.stat-label{font-size:11px;color:var(--muted);margin-top:4px}
.section-title{font-size:13px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;padding:0 24px;margin-bottom:16px}
.history-list{padding:0 24px;display:flex;flex-direction:column;gap:12px}
.history-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;display:flex;justify-content:space-between;align-items:center}
.history-prompt{font-size:14px;color:var(--text);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
.history-meta{font-size:12px;color:var(--muted)}.history-score{font-size:22px;font-weight:700}
.dash-practice-btn{margin:24px;display:flex;flex-direction:column;align-items:center}
.loading-screen{display:none;position:fixed;inset:0;background:rgba(247,245,240,0.92);align-items:center;justify-content:center;flex-direction:column;gap:20px;z-index:100;backdrop-filter:blur(8px)}
.loading-screen.active{display:flex}
.spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}.loading-text{font-size:15px;color:var(--muted)}
.text-green{color:var(--green)}.text-gold{color:var(--gold)}.text-red{color:var(--red)}.text-accent{color:var(--accent2)}

/* ── FREE PRACTICE SCREEN ── */
#screen-free{overflow-y:auto;padding-bottom:calc(var(--nav-h) + 20px);background:var(--bg)}
.free-header{padding:52px 20px 24px;background:linear-gradient(180deg,#FDF3E3 0%,var(--bg) 100%)}
.free-header h1{font-family:'DM Serif Display',serif;font-size:28px;margin-bottom:6px}
.free-header p{font-size:14px;color:var(--muted);line-height:1.6}
.free-mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px 20px}
.free-mode-card{background:var(--surface);border:2px solid var(--border);border-radius:22px;padding:20px 16px;cursor:pointer;transition:all 0.15s;text-align:center}
.free-mode-card:active{transform:scale(0.96)}
.free-mode-card.selected{border-color:var(--accent);background:rgba(91,79,217,0.06)}
.free-mode-icon{font-size:36px;margin-bottom:10px}
.free-mode-title{font-size:15px;font-weight:800;color:var(--text);margin-bottom:4px}
.free-mode-desc{font-size:12px;color:var(--muted);line-height:1.4}
.free-prompt-area{margin:0 16px 20px;background:var(--surface);border:2px solid var(--border);border-radius:22px;padding:20px}
.free-prompt-label{font-size:11px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:10px}
.free-prompt-text{font-family:'DM Serif Display',serif;font-size:20px;line-height:1.45;color:var(--text);margin-bottom:16px}
.free-recording-zone{display:flex;flex-direction:column;align-items:center;padding:0 16px 24px;gap:18px}
.free-section-title{font-size:13px;font-weight:800;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:0 20px;margin-bottom:8px}
#screen-lesson{overflow-y:auto;padding-bottom:calc(var(--nav-h) + 100px);background:var(--bg)}
.lesson-header{padding:56px 24px 28px;background:linear-gradient(180deg,#EDE8FF 0%,var(--bg) 100%)}
.lesson-step-pills{display:flex;gap:8px;margin-bottom:20px}
.step-pill{flex:1;height:4px;border-radius:100px;background:var(--border);transition:background 0.4s}
.step-pill.active{background:var(--accent)}
.step-pill.done{background:var(--green)}
.lesson-step-label{font-size:11px;color:var(--accent2);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.lesson-title{font-family:'DM Serif Display',serif;font-size:24px;line-height:1.3;color:var(--text)}

/* READ step */
.lesson-body{padding:0 24px}
.lesson-content{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:16px}
.lesson-content p{font-size:15px;color:var(--text);line-height:1.75;margin-bottom:16px}
.lesson-content p:last-child{margin-bottom:0}
.lesson-content .highlight-box{background:rgba(91,79,217,0.07);border-left:3px solid var(--accent);border-radius:0 12px 12px 0;padding:14px 16px;margin:16px 0;font-size:14px;color:var(--text);line-height:1.6;font-style:italic}
.lesson-content h3{font-family:'DM Serif Display',serif;font-size:17px;color:var(--text);margin-bottom:10px;margin-top:4px}
.key-insight{background:linear-gradient(135deg,rgba(91,79,217,0.08),rgba(46,158,122,0.06));border:1px solid rgba(91,79,217,0.2);border-radius:16px;padding:18px 20px;margin-bottom:16px;display:flex;gap:14px;align-items:flex-start}
.key-insight-icon{font-size:22
